# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# PROJECT:    Relay (formerly Brain Loader v2)
# REPO:       https://github.com/Ehsas317/relay
# WHAT:       The coordinator stays resident and relays the baton between
#             hot-swapped models. The core metaphor is handoffs, not planning.
#
# THIS FILE:
#   Configuration for the Relay orchestrator. Defines model configs, API
#   keys, state management, and build parameters.
#
# HOW TO USE RELAY:
#   1. Install:    pip install -r requirements.txt
#   2. Configure:  Copy to config.yaml, add your API tokens
#   3. Run:        python main.py "Your project description"
#
# ═══════════════════════════════════════════════════════════════════════════

# ============================================================
# RELAY CONFIGURATION
# ============================================================
# Hardware: MacBook Pro M1 Max 32GB (25GB allocated)
# Coordinator stays resident, models are hot-swapped
# ============================================================

app_name: "relay"

# Generation limits
max_worker_tokens: 4096
max_brain_tokens: 8192

# Model pool — models can be loaded/unloaded on demand
models:
  relay-brain:
    description: "Central planning and architecture decisions"
    path: "./models/relay-brain-q4.gguf"
    # Or cloud: "claude-sonnet-4-20250514"
    max_tokens: 8192
    ram_estimate_gb: 5

  relay-coder:
    description: "Frontend code generation"
    path: "./models/relay-coder-q4.gguf"
    max_tokens: 4096
    ram_estimate_gb: 4.5

  relay-coderx:
    description: "Backend code generation"
    path: "./models/relay-coderx-q6.gguf"
    max_tokens: 4096
    ram_estimate_gb: 6

# Cloud API fallbacks (used when local models fail or for hot-swap)
cloud:
  deepseek:
    api_key: "YOUR_DEEPSEEK_KEY"
    model: "deepseek-chat"
    endpoint: "https://api.deepseek.com/v1"
  mistral:
    api_key: "YOUR_MISTRAL_KEY"
    model: "mistral-small"
    endpoint: "https://api.mistral.ai/v1"
  anthropic:
    api_key: "YOUR_ANTHROPIC_KEY"
    model: "claude-sonnet-4-20250514"
    endpoint: "https://api.anthropic.com/v1"
  together:
    api_key: "YOUR_TOGETHER_KEY"
    model: "meta-llama/Llama-4-Maverick-17B"
    endpoint: "https://api.together.ai/v1"

# Telegram notifications
telegram:
  enabled: true
  bot_token: "YOUR_BOT_TOKEN"
  chat_id: "YOUR_CHAT_ID"

# State management
state:
  auto_save: true
  state_file: "memory/state.json"
  memory_file: "memory/context.json"
